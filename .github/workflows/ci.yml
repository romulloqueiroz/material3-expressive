name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` runs the `prepare` script, which builds dist via tsup.
      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
